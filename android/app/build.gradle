plugins {
    id 'com.android.application'
}

android {
    namespace 'com.vocabapp.mini'
    compileSdk 34

    signingConfigs {
        release {
            storeFile file("vocab-app-keystore.jks")
            storePassword "vocab123"
            keyAlias "vocabapp"
            keyPassword "vocab123"
        }
    }

    defaultConfig {
        applicationId "com.vocabapp.mini"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.8.0'
}
