<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B9D">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="英语单词">
  <title>英语单词背诵</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 应用主容器 -->
  <div id="app">

    <!-- ===================== 首页 ===================== -->
    <div class="page" id="page-home" style="display:block;">
      <div class="page-header">
        <h1 class="app-title">📚 英语单词</h1>
        <div class="review-badge" id="review-badge">
          <span id="review-count">0</span> 待复习
        </div>
      </div>

      <!-- 学习统计 -->
      <div class="stats-bar" id="home-stats"></div>

      <!-- 词库组列表 -->
      <div class="home-groups-container">
        <div class="section-title">我的词库</div>
        <div id="home-vocab-groups"></div>
      </div>
    </div>

    <!-- ===================== 背诵页 ===================== -->
    <div class="page" id="page-study" style="display:none;">
      <div class="page-header">
        <h2 class="page-title">📖 背单词</h2>
      </div>
      <div id="study-content"></div>
    </div>

    <!-- ===================== 词库页 ===================== -->
    <div class="page" id="page-wordlist" style="display:none;">
      <div class="page-header">
        <h2 class="page-title">📂 词库管理</h2>
      </div>

      <!-- Tab 切换 -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="my-vocab">我的词库</button>
        <button class="tab-btn" data-tab="custom">手动添加</button>
      </div>

      <!-- 我的词库面板 -->
      <div id="my-vocab-panel" class="tab-panel">
        <div id="my-vocablist"></div>
      </div>

      <!-- 手动添加面板 -->
      <div id="custom-panel" class="tab-panel" style="display:none;">
        <div id="custom-wordlist"></div>
      </div>
    </div>

    <!-- ===================== 关于页 ===================== -->
    <div class="page" id="page-about" style="display:none;">
      <div class="page-header">
        <h2 class="page-title">ℹ️ 关于</h2>
      </div>
      <div class="about-content">
        <div class="app-logo">📚</div>
        <h2>英语单词背诵</h2>
        <p class="version">版本 2.0</p>
        <div class="about-features">
          <div class="feature-item">📷 拍照/图片/PDF 识别导入</div>
          <div class="feature-item">📋 模板批量导入</div>
          <div class="feature-item">🌐 联网自动补全音标/词性/例句</div>
          <div class="feature-item">🃏 卡片翻面 + ✅ 选择题 + ✏️ 拼写三种模式</div>
          <div class="feature-item">🔄 艾宾浩斯间隔复习</div>
          <div class="feature-item">🔊 TTS 发音</div>
          <div class="feature-item">📶 离线使用</div>
        </div>
        <p class="about-note">适合小学生使用，无广告、无登录</p>
      </div>

      <!-- 数据备份与恢复 -->
      <div class="backup-section">
        <div class="section-title">💾 数据备份与恢复</div>
        <div id="backup-content"></div>
      </div>
    </div>

  </div>

  <!-- ===================== 底部导航 ===================== -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">首页</span>
    </button>
    <button class="nav-item" data-page="study">
      <span class="nav-icon">📖</span>
      <span class="nav-label">背诵</span>
    </button>
    <button class="nav-item" data-page="wordlist">
      <span class="nav-icon">📂</span>
      <span class="nav-label">词库</span>
    </button>
    <button class="nav-item" data-page="about">
      <span class="nav-icon">ℹ️</span>
      <span class="nav-label">关于</span>
    </button>
  </nav>

  <!-- ===================== 外部库（CDN，异步加载）===================== -->
  <!-- Tesseract.js for OCR -->
  <script src="https://unpkg.com/tesseract.js@5.1.0/dist/tesseract.min.js" async></script>
  <!-- PDF.js for PDF parsing -->
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js" async></script>
  <script>
    // PDF.js worker 配置（加载完成后设置）
    window.addEventListener('load', function() {
      if (typeof pdfjsLib !== 'undefined') {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
      }
    });
  </script>

  <!-- ===================== 应用脚本 ===================== -->
  <script src="js/tts.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/review.js"></script>
  <script src="js/study.js"></script>
  <script src="js/importer.js"></script>
  <script src="js/wordlist.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
